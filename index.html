<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stryde - Shoes • Sport • Style</title>
    <link rel="icon" href="images/images//favicon.png">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                STRYDE
                <img src="images/essentials/icon_transparent.png" alt="Stryde Logo" class="logo-img">
            </div>
            <button class="cart-btn" id="cart-btn">
                <span class="cart-icon">🛒</span>
                Cart
                <span class="cart-count" id="cart-count">0</span>
            </button>
        </nav>
    </header>

    <main>

        <!-- SLIDESHOW -->
        <section class="slideshow-section">
            <button class="slide-btn prev">&#8249;</button>

            <div class="slide-content">
                <div class="slide-text">
                    <h1>Built to Run.<br>Made to Last.</h1>
                    <p>Premium shoes for every stride.</p>
                    <button class="btn-buy">Buy Now</button>
                </div>
                <img src="images/featured/sneakers.png" alt="Maroon Sneakers">
            </div>

            <div class="slide-content">
                <div class="slide-text">
                    <h1>Street Ready.<br>Always.</h1>
                    <p>Performance meets everyday style.</p>
                    <button class="btn-buy">Buy Now</button>
                </div>
                <img src="images/featured/running.png" alt="Blue Running Shoes">
            </div>

            <div class="slide-content">
                <div class="slide-text">
                    <h1>Bold Colors.<br>Bold Moves.</h1>
                    <p>Express yourself with every step.</p>
                    <button class="btn-buy">Buy Now</button>
                </div>
                <img src="images/featured/casual.png" alt="Colorful Design Shoes">
            </div>

            <button class="slide-btn next">&#8250;</button>
        </section>

        <!-- PRODUCTS — rendered by home.js from products.json -->
        <section class="products-section">
            <h2>OUR PRODUCTS</h2>
            <div class="products-grid" id="products-grid">
                <!-- Cards injected here by home.js -->
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 STRYDE. All rights reserved.</p>
    </footer>

    <!-- Product Detail Overlay (US-view) -->
    <div id="product-overlay" class="product-overlay hidden">
        <div class="product-overlay-box" id="product-overlay-box">
            <!-- Filled by product.js -->
        </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/product.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
