<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scalgit ade=1.0">
    <title>Stryde - Shoes • Sport • Style</title>
    <link rel="icon" href="images/images//favicon.png">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                STRYDE
                <img src="images/essentials/icon_transparent.png" alt="Stryde Logo" class="logo-img">
            </div>

            <!-- Hamburger — visible on mobile only -->
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li class="has-dropdown">
                    <a href="#">Categories ▾</a>
                </li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="reviews.html">Reviews</a></li>
            </ul>

            <button class="cart-btn" id="cart-btn">
                <span class="cart-icon">🛒</span>
                Cart
                <span class="cart-count" id="cart-count">0</span>
            </button>
        </nav>
    </header>

    <main>

        <!-- SLIDESHOW -->
        <section class="slideshow-section">
            <button class="slide-btn prev">&#8249;</button>

            <!-- Slide 1 -->
            <div class="slide-content" style="background-image: url('images/featured/casual.png'); background-size: cover; background-position: right center;">
                <div class="slide-text">
                    <h1>Bold Colors.<br>Bold Moves.</h1>
                    <p>Express yourself with every step.</p>
                    <button class="btn-buy" onclick="openProduct(1, productsData)">Buy Now</button>
                </div>
            </div>

            <!-- Slide 2 -->
            <div class="slide-content" style="background-image: url('images/featured/sneakers.png'); background-size: cover; background-position: right center;">
                <div class="slide-text">
                    <h1>Built to Run.<br>Made to Last.</h1>
                    <p>Premium shoes for every stride.</p>
                    <button class="btn-buy" onclick="openProduct(2, productsData)">Buy Now</button>
                </div>
            </div>

            <!-- Slide 3 -->
            <div class="slide-content" style="background-image: url('images/featured/running.png'); background-size: cover; background-position: right center;">
                <div class="slide-text">
                    <h1>Street Ready.<br>Always.</h1>
                    <p>Performance meets everyday style.</p>
                    <button class="btn-buy" onclick="openProduct(3, productsData)">Buy Now</button>
                </div>
            </div>

            <button class="slide-btn next">&#8250;</button>
        </section>

        <!-- PRODUCTS — rendered by index.js from products.json -->
        <section class="products-section">
            <h2>OUR PRODUCTS</h2>
            <div class="products-grid" id="products-grid">
                <!-- Cards injected here by index.js -->
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 STRYDE. All rights reserved.</p>
    </footer>

    <!-- Product Detail Overlay (US-view) -->
    <div id="product-overlay" class="product-overlay hidden">
        <div class="product-overlay-box" id="product-overlay-box">
            <!-- Filled by product.js -->
        </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/product.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
